<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C72FF"/>
      <stop offset="100%" stop-color="#5248D0"/>
    </linearGradient>
    <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Back card (teal) — rotated left -->
  <rect x="106" y="172" width="300" height="188" rx="22" fill="#00C9A7"
        transform="rotate(-16, 256, 390)"/>

  <!-- Middle card (amber) — slightly rotated -->
  <rect x="106" y="172" width="300" height="188" rx="22" fill="#FFB300"
        transform="rotate(-5, 256, 390)"/>

  <!-- Front card (white) -->
  <rect x="106" y="160" width="300" height="188" rx="22" fill="white"
        filter="url(#cardShadow)"/>

  <!-- EMV Chip -->
  <rect x="143" y="198" width="54" height="42" rx="7" fill="#D4AF37"/>
  <rect x="153" y="198" width="2" height="42" fill="#B8932B" opacity="0.55"/>
  <rect x="163" y="198" width="2" height="42" fill="#B8932B" opacity="0.55"/>
  <rect x="173" y="198" width="2" height="42" fill="#B8932B" opacity="0.55"/>
  <rect x="183" y="198" width="2" height="42" fill="#B8932B" opacity="0.55"/>
  <rect x="143" y="213" width="54" height="2" fill="#B8932B" opacity="0.55"/>
  <rect x="143" y="226" width="54" height="2" fill="#B8932B" opacity="0.55"/>

  <!-- Masked card number dots -->
  <circle cx="143" cy="283" r="5" fill="#B0A8E8"/>
  <circle cx="158" cy="283" r="5" fill="#B0A8E8"/>
  <circle cx="173" cy="283" r="5" fill="#B0A8E8"/>
  <circle cx="188" cy="283" r="5" fill="#B0A8E8"/>

  <circle cx="213" cy="283" r="5" fill="#B0A8E8"/>
  <circle cx="228" cy="283" r="5" fill="#B0A8E8"/>
  <circle cx="243" cy="283" r="5" fill="#B0A8E8"/>
  <circle cx="258" cy="283" r="5" fill="#B0A8E8"/>

  <circle cx="283" cy="283" r="5" fill="#B0A8E8"/>
  <circle cx="298" cy="283" r="5" fill="#B0A8E8"/>
  <circle cx="313" cy="283" r="5" fill="#B0A8E8"/>
  <circle cx="328" cy="283" r="5" fill="#B0A8E8"/>
</svg>
